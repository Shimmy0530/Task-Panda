services:
  backend:
    build: ./backend
    container_name: focus-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=sqlite:////data/focus.db
    networks: [internal]
    ports:
      - "127.0.0.1:17840:8000"

  frontend:
    build: ./frontend
    container_name: focus-frontend
    restart: unless-stopped
    networks: [internal]
    ports:
      - "127.0.0.1:17841:3000"

networks:
  internal:
