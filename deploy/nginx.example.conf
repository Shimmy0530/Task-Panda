# Task Panda — example nginx vhost
#
# Copy this file to /etc/nginx/sites-available/<your-domain>, fill in the
# placeholders below, symlink into sites-enabled/, then:
#
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace:
#   - server_name              : your hostname (in both server blocks)
#   - ssl_certificate(_key)    : your TLS cert + key
#                                (Cloudflare Origin, Let's Encrypt, etc.)
#   - upstream ports 17840/17841 are the host loopback ports the
#     docker-compose.yml stack binds — change here AND there together
#     if you use different ports.
#
# Cloudflare-only:
#   - The set_real_ip_from blocks + real_ip_header restore the visitor IP
#     when traffic comes through Cloudflare. Delete the whole block if
#     you're not behind Cloudflare.

server {
    server_name your-domain.example.com;

    ssl_certificate     /etc/ssl/your-cert.pem;
    ssl_certificate_key /etc/ssl/your-cert.key;

    # --- Cloudflare-only (delete if not behind Cloudflare) ---
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;
    # --- /Cloudflare-only ---

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:17840;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:17841;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # nginx <1.25: use this. nginx >=1.25: replace with `http2 on;`
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example.com;
    return 301 https://$host$request_uri;
}
